<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-spring4-4.dtd">
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head"> <title th:text="#{reservation.pageTitle}">Lista de Espacios</title> </head>
<body>
<nav th:replace="fragments/nav"></nav>
<div class="container" id="main-container">
    <h2 th:text="#{reservation.title}">Reservar</h2>
    <form class="form-horizontal" method="post" action="/reservations/add" th:object="${reservation}">
        <div class="form-group">
            <label class="control-label col-sm-2" for="space" th:text="#{reservation.space}">Espacio:</label>
            <div class="col-sm-10" th:if="${activeSpaces != null and not #lists.isEmpty(activeSpaces)}">
                <select id="space" class="form-control" name="space">
                    <option th:each="space : ${activeSpaces}"
                            th:value="${space.id}"
                            th:text="${space.name} + ' - ' + #{reservation.capacity} + ': ' + ${space.capacity}">
                        Espacio
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="control-label col-sm-2" for="startDate" th:text="#{reservation.startDate}">Fecha inicio reserva:</label>
                <div class="col-sm-10">
                    <input type="datetime-local" id="startDate" name="startDate" class="form-control" required >
                    <span class="text-danger" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></span>
                </div>

                <label class="control-label col-sm-2" for="endDate" th:text="#{reservation.endDate}">Fecha fin reserva:</label>
                <div class="col-sm-10">
                    <input type="datetime-local" id="endDate" name="endDate" class="form-control" required >
                </div>

                <label class="control-label col-sm-2" for="reason" th:text="#{reservation.reason}">Motivo</label>
                <div class="col-sm-10">
                    <input type="text" id="reason" name="reason" class="form-control">
                </div>

            </div>
        </div>
        <!-- Sección de reserva recurrente -->
        <div class="form-group">
            <label class="control-label col-sm-2" th:text="#{reservation.recurrence.frequency}">Frecuencia:</label>
            <div class="col-sm-10">
                <select id="recurrenceFrequency" name="recurrenceFrequency" class="form-control">
                    <option value="" th:text="#{reservation.recurrence.none}">Sin recurrencia</option>
                    <option value="DAILY" th:text="#{reservation.recurrence.DAILY}">Diaria</option>
                    <option value="WEEKLY" th:text="#{reservation.recurrence.WEEKLY}">Semanal</option>
                    <option value="MONTHLY" th:text="#{reservation.recurrence.MONTHLY}">Mensual</option>
                    <option value="YEARLY" th:text="#{reservation.recurrence.YEARLY}">Anual</option>
                </select>
            </div>
        </div>
        <div class="form-group" id="recurrenceEndDateGroup">
            <label class="control-label col-sm-2" th:text="#{reservation.recurrence.endDate}">Fecha fin recurrencia:</label>
            <div class="col-sm-10">
                <input type="date" id="recurrenceEndDate" name="recurrenceEndDate" class="form-control">
            </div>
        </div>

        <!-- Mensajes de resultado -->
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-10">
                <span class="text-danger" th:if="${errorMessage != null}" th:text="#{__${errorMessage}__}"></span>
                <span class="text-success" th:if="${successMessage != null}" th:text="#{__${successMessage}__}"></span>
            </div>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-10">
                <button type="submit" class="btn btn-primary" th:text="#{reservation.submit}">Reservar</button>
            </div>
        </div>
    </form>
</div>

<footer th:replace="fragments/footer"></footer>
</body>
</html>
