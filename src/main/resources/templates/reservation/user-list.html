<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-spring4-4.dtd">
<html lang="es" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="fragments/head"></head>
<body>
<nav th:replace="fragments/nav"></nav>

<div class="container" id="main-container">
    <h2>Mis Reservas</h2>

    <form class="form-inline" action="/reservations/list" method="GET">
        <div class="form-group">
            <label for="status">Estado:</label>
            <select name="status" id="status" class="form-control">
                <option value="">Todos</option>
                <option th:each="stat : ${statuses}"
                        th:value="${stat.name()}"
                        th:text="${stat.name()}"
                        th:selected="${param.status != null and param.status[0] == stat.name()}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Filtrar</button>
    </form>

    <p>Listado de tus reservas registradas (activas y canceladas).</p>

    <button type="button" id="updateButton" class="btn btn-secondary">Actualizar</button>
    <script th:inline="javascript">
        /*<![CDATA[*/
        $("#updateButton").click(function () {
            let page = /*[[${param.page != null and !#lists.isEmpty(param.page) ? param.page[0] : null}]]*/ null;
            let status = /*[[${param.status != null and !#lists.isEmpty(param.status) ? param.status[0] : ''}]]*/ '';

            let urlUpdate = '/reservations/update?';
            if (page != null) urlUpdate += "page=" + page + "&";
            if (status !== '') urlUpdate += "status=" + status;

            $("#tableReservation").load(urlUpdate);
        });
        /*]]>*/
    </script>

    <div class="table-responsive">
        <div th:fragment="tableReservation" id="tableReservation">
            <table class="table table-striped table-hover">
                <thead>
                <tr>
                    <th>Espacio</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Estado</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="res : ${reservationList}">
                    <td th:text="${res.space.name}">Nombre Espacio</td>
                    <td th:text="${#temporals.format(res.startDate, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</td>
                    <td th:text="${#temporals.format(res.endDate, 'dd/MM/yyyy HH:mm')}">01/01/2026 12:00</td>
                    <td th:text="${res.status}">ACTIVA</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(reservationList)}" class="alert alert-info mt-3">
        No tienes reservas que coincidan con los criterios de búsqueda.
    </div>

    <footer th:replace="fragments/pagination"></footer>
</div>
<footer th:replace="fragments/footer"></footer>
</body>
</html>
