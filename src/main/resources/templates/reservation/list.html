<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-spring4-4.dtd">
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="fragments/head"></head>
<body>
<nav th:replace="fragments/nav"></nav>

<div class="container" id="main-container">
    <h2>Listado Global de Reservas</h2>

    <form class="form-inline" action="/admin/reservations" method="GET">
        <div class="form-group">
            <label for="spaceId">Espacio:</label>
            <select name="spaceId" id="spaceId" class="form-control">
                <option value="">Todos los espacios</option>
                <option th:each="space : ${spaces}"
                        th:value="${space.id}"
                        th:text="${space.name}"
                        th:selected="${param.spaceId != null and param.spaceId[0] == space.id.toString()}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="startDate">Desde:</label>
            <input type="date" id="startDate" name="startDate" class="form-control" th:value="${param.startDate}">
        </div>

        <div class="form-group">
            <label for="endDate">Hasta:</label>
            <input type="date" id="endDate" name="endDate" class="form-control" th:value="${param.endDate}">
        </div>

        <button type="submit" class="btn btn-primary">Buscar</button>
    </form>

    <p>Listado de todas las reservas registradas en el sistema (activas y canceladas).</p>

    <button type="button" id="updateButton" class="btn btn-secondary">Actualizar</button>
    <script th:inline="javascript">
        /*<![CDATA[*/
        $("#updateButton").click(function () {
            let page = /*[[${param.page != null and !#lists.isEmpty(param.page) ? param.page[0] : null}]]*/ null;
            let spaceId = /*[[${param.spaceId != null and !#lists.isEmpty(param.spaceId) ? param.spaceId[0] : ''}]]*/ '';
            let startDate = /*[[${param.startDate != null and !#lists.isEmpty(param.startDate) ? param.startDate[0] : ''}]]*/ '';
            let endDate = /*[[${param.endDate != null and !#lists.isEmpty(param.endDate) ? param.endDate[0] : ''}]]*/ '';

            let urlUpdate = '/admin/reservations/update?';
            if (page != null) urlUpdate += "page=" + page + "&";
            if (spaceId !== '') urlUpdate += "spaceId=" + spaceId + "&";
            if (startDate !== '') urlUpdate += "startDate=" + startDate + "&";
            if (endDate !== '') urlUpdate += "endDate=" + endDate;

            $("#tableReservation").load(urlUpdate);
        });
        /*]]>*/
    </script>

    <div class="table-responsive">
        <div th:fragment="tableReservation" id="tableReservation">
            <table class="table table-striped table-hover">
                <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Espacio</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Estado</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="res : ${reservations}">
                    <td>DNI - Nombre</td>
                    <td>Nombre Espacio</td>
                    <td>01/01/2026 10:00</td>
                    <td>01/01/2026 12:00</td>
                    <td>ACTIVA</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(reservations)}" class="alert alert-info">
        No hay reservas que coincidan con los criterios de búsqueda.
    </div>

    <footer th:replace="fragments/pagination"></footer>
</div>
<footer th:replace="fragments/footer"></footer>
</body>
</html>
