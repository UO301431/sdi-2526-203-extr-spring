<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://thymeleaf.org">
<head th:replace="fragments/head">
    <meta charset="UTF-8">
</head>
<body>

<nav th:replace="fragments/nav"></nav>

<div class="container">
    <h2 th:text="#{login.title}">Identifícate</h2>
    <form class="form-horizontal" method="post" action="/login">
        <div class="form-group">
            <label class="control-label col-sm-2" for="username" th:text="#{login.dni}">DNI:</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" id="username"   name="username"
                       th:placeholder="#{login.dni.placeholder}" placeholder="Ejemplo: profSDI" required />
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-sm-2" for="username" th:text="#{login.password}">Password:</label>
            <div class="col-sm-10">
                <label for="password"></label>
                <input type="password" class="form-control" id="password" name="password"
                       th:placeholder="#{login.password.placeholder}" placeholder="Entre el Password" required />
            </div>
        </div>
        <div th:if="${param.error}" class="alert alert-danger" style="margin-bottom: 20px;">
            <span th:text="#{login.error.message}">DNI o contraseña incorrectos.</span>
        </div>
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-10">
                <button type="submit" class="btn btn-primary" th:text="#{login.button}">Login</button>
            </div>
        </div>
    </form>

</div>
<footer th:replace="fragments/footer"></footer>
</body>
</html>
